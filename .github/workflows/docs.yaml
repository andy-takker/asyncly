name: Deploy documentation

on:
  push:
    branches:
      - master
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install -U pip uv
          uv sync --all-extras --group docs

      - name: Configure git identity for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages branch
        run: git fetch origin gh-pages --depth=1 || true

      - name: Deploy release version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          uv run mike deploy --push --update-aliases "${{ github.ref_name }}" latest
          uv run mike set-default --push latest

      - name: Deploy dev version
        if: github.ref == 'refs/heads/master'
        run: |
          uv run mike deploy --push --update-aliases dev
